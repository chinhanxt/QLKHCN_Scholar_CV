<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Email thử nghiệm</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background-color: #10b981; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
        <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Email Kiểm Tra Hệ Thống</h1>
    </div>
    <div style="background-color: #ffffff; padding: 20px; border: 1px solid #e5e7eb; border-radius: 0 0 8px 8px;">
        <p>Xin chào <strong>{{ user.get_full_name|default:user.username }}</strong>,</p>
        <p>Đây là email thử nghiệm gửi từ Hệ thống Quản lý Khai thác Dữ liệu Khoa học (QLKHCN Scholar CV).</p>
        <p style="background-color: #f3f4f6; padding: 10px; border-radius: 4px;">{{ message|default:"Hệ thống hoạt động bình thường." }}</p>
    </div>
</body>
</html>
